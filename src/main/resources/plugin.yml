main: com.sethome.SetHomePlugin

name: SetHome
version: 1.0.0
main: com.sethome.SetHomePlugin
api-version: 1.21
description: Simple SetHome/Home plugin with YAML-per-player storage and 3s cooldown
commands:
  sethome:
    description: Set a home. Usage: /sethome [name]
    usage: /sethome [name]
    permission: sethome.use
  home:
    description: Teleport to a home. Usage: /home [name]
    usage: /home [name]
    permission: sethome.use
permissions:
  sethome.use:
    description: Allows using /sethome and /home
    default: true
